# Scenario 5 — Worst Case Convergence
# All 20 buses dispatched within a 72-minute window (every 8 min) from both ends.
# By the time buses reach inner stations (B and C), they collide. Maximum contention.

metadata:
  name: "Scenario 5 — Worst Case Convergence"
  description: >
    All 20 buses dispatched within a 72-minute window (every 8 min) from
    both ends. Inner stations (B, C) face maximum contention as buses converge.

route:
  segments:
    - { from: "Bengaluru", to: "A", distance_km: 100 }
    - { from: "A", to: "B", distance_km: 120 }
    - { from: "B", to: "C", distance_km: 100 }
    - { from: "C", to: "D", distance_km: 120 }
    - { from: "D", to: "Kochi", distance_km: 100 }
  charging_stations:
    A: { chargers: 1 }
    B: { chargers: 1 }
    C: { chargers: 1 }
    D: { chargers: 1 }

fleet:
  battery_range_km: 240
  charging_time_min: 25
  speed_kmh: 60
  buses:
    # Bengaluru → Kochi (8 min spacing)
    - { id: "bus-BK-01", operator: "kpn",      direction: "BK", departure: "19:00" }
    - { id: "bus-BK-02", operator: "freshbus",  direction: "BK", departure: "19:08" }
    - { id: "bus-BK-03", operator: "flixbus",   direction: "BK", departure: "19:16" }
    - { id: "bus-BK-04", operator: "kpn",       direction: "BK", departure: "19:24" }
    - { id: "bus-BK-05", operator: "freshbus",  direction: "BK", departure: "19:32" }
    - { id: "bus-BK-06", operator: "flixbus",   direction: "BK", departure: "19:40" }
    - { id: "bus-BK-07", operator: "kpn",       direction: "BK", departure: "19:48" }
    - { id: "bus-BK-08", operator: "freshbus",  direction: "BK", departure: "19:56" }
    - { id: "bus-BK-09", operator: "flixbus",   direction: "BK", departure: "20:04" }
    - { id: "bus-BK-10", operator: "kpn",       direction: "BK", departure: "20:12" }
    # Kochi → Bengaluru (8 min spacing)
    - { id: "bus-KB-01", operator: "freshbus",  direction: "KB", departure: "19:00" }
    - { id: "bus-KB-02", operator: "flixbus",   direction: "KB", departure: "19:08" }
    - { id: "bus-KB-03", operator: "kpn",       direction: "KB", departure: "19:16" }
    - { id: "bus-KB-04", operator: "freshbus",  direction: "KB", departure: "19:24" }
    - { id: "bus-KB-05", operator: "flixbus",   direction: "KB", departure: "19:32" }
    - { id: "bus-KB-06", operator: "kpn",       direction: "KB", departure: "19:40" }
    - { id: "bus-KB-07", operator: "freshbus",  direction: "KB", departure: "19:48" }
    - { id: "bus-KB-08", operator: "flixbus",   direction: "KB", departure: "19:56" }
    - { id: "bus-KB-09", operator: "kpn",       direction: "KB", departure: "20:04" }
    - { id: "bus-KB-10", operator: "freshbus",  direction: "KB", departure: "20:12" }

weights:
  individual_wait: 1.0
  operator_fairness: 1.0
  overall_time: 1.0

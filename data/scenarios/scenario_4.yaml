# Scenario 4 — Operator-Heavy
# One operator (KPN) dominates the Bengaluru→Kochi fleet (8 of 10 buses).
# Operator weight is doubled. Tuning operator weight up vs down should
# produce visibly different schedules.

metadata:
  name: "Scenario 4 — Operator-Heavy"
  description: >
    KPN dominates the Bengaluru→Kochi fleet (8 of 10 buses). Operator
    weight is set to 2.0. Changing it should produce visibly different schedules.

route:
  segments:
    - { from: "Bengaluru", to: "A", distance_km: 100 }
    - { from: "A", to: "B", distance_km: 120 }
    - { from: "B", to: "C", distance_km: 100 }
    - { from: "C", to: "D", distance_km: 120 }
    - { from: "D", to: "Kochi", distance_km: 100 }
  charging_stations:
    A: { chargers: 1 }
    B: { chargers: 1 }
    C: { chargers: 1 }
    D: { chargers: 1 }

fleet:
  battery_range_km: 240
  charging_time_min: 25
  speed_kmh: 60
  buses:
    # Bengaluru → Kochi — KPN-dominated
    - { id: "bus-BK-01", operator: "kpn",      direction: "BK", departure: "19:00" }
    - { id: "bus-BK-02", operator: "kpn",      direction: "BK", departure: "19:15" }
    - { id: "bus-BK-03", operator: "kpn",      direction: "BK", departure: "19:30" }
    - { id: "bus-BK-04", operator: "kpn",      direction: "BK", departure: "19:45" }
    - { id: "bus-BK-05", operator: "kpn",      direction: "BK", departure: "20:00" }
    - { id: "bus-BK-06", operator: "kpn",      direction: "BK", departure: "20:15" }
    - { id: "bus-BK-07", operator: "kpn",      direction: "BK", departure: "20:30" }
    - { id: "bus-BK-08", operator: "kpn",      direction: "BK", departure: "20:45" }
    - { id: "bus-BK-09", operator: "freshbus",  direction: "BK", departure: "21:00" }
    - { id: "bus-BK-10", operator: "flixbus",   direction: "BK", departure: "21:15" }
    # Kochi → Bengaluru — mixed operators
    - { id: "bus-KB-01", operator: "freshbus",  direction: "KB", departure: "19:00" }
    - { id: "bus-KB-02", operator: "flixbus",   direction: "KB", departure: "19:15" }
    - { id: "bus-KB-03", operator: "kpn",       direction: "KB", departure: "19:30" }
    - { id: "bus-KB-04", operator: "freshbus",  direction: "KB", departure: "19:45" }
    - { id: "bus-KB-05", operator: "flixbus",   direction: "KB", departure: "20:00" }
    - { id: "bus-KB-06", operator: "kpn",       direction: "KB", departure: "20:15" }
    - { id: "bus-KB-07", operator: "freshbus",  direction: "KB", departure: "20:30" }
    - { id: "bus-KB-08", operator: "flixbus",   direction: "KB", departure: "20:45" }
    - { id: "bus-KB-09", operator: "kpn",       direction: "KB", departure: "21:00" }
    - { id: "bus-KB-10", operator: "freshbus",  direction: "KB", departure: "21:15" }

weights:
  individual_wait: 1.0
  operator_fairness: 2.0   # <-- doubled for this scenario
  overall_time: 1.0
